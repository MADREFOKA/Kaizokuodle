<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Challenge - One Piece</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .grid-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .game-grid {
            display: grid;
            grid-template-columns: 150px repeat(3, 1fr);
            grid-template-rows: 150px repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 15px;
        }
        .grid-header {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            padding: 0.5rem;
        }
        .grid-cell {
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0.5rem;
            color: #1a1a2e;
        }
        .grid-cell:hover {
            transform: scale(1.05);
            border-color: #f59e0b;
        }
        .grid-cell.filled {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: #3b82f6;
            color: white;
            cursor: default;
        }
        .grid-cell.correct {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: #10b981;
            color: white;
        }
        .grid-cell.incorrect {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-color: #ef4444;
            color: white;
        }
        .grid-cell img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 0.25rem;
        }
        .grid-cell .name {
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
        }
        .input-container {
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        .input-container input {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.95);
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            color: #1a1a2e;
        }
        .input-container input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        .suggestions {
            background: white;
            border-radius: 10px;
            margin-top: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .suggestion-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #e5e7eb;
            color: #1a1a2e;
            font-weight: 600;
        }
        .suggestion-item:hover {
            background: #f59e0b;
            color: white;
        }
    </style>
    <script src="../report-system.js"></script>
</head>
<body>
<script>const reporter = new ErrorReporter("Grid Challenge");</script>
    <div class="grid-container">
        <a href="../index.html" style="position: fixed; top: 20px; left: 20px; padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 600; border: 2px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.1); color: white; text-decoration: none; z-index: 1000; backdrop-filter: blur(10px);">← Volver</a>
        
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 class="title-font" style="font-size: 2.5rem; background: linear-gradient(to right, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem;">GRID CHALLENGE</h1>
            <div style="background: rgba(255, 255, 255, 0.95); padding: 1.5rem 2rem; border-radius: 15px; display: inline-block; box-shadow: 0 8px 25px rgba(0,0,0,0.3);">
                <p style="font-size: 1.1rem; color: #1a1a2e; margin-bottom: 0.5rem; font-weight: 600;">Aciertos</p>
                <p id="score" style="font-size: 3rem; font-weight: 800; color: #fbbf24;">0/9</p>
            </div>
        </div>

        <div id="app">Cargando...</div>
    </div>

    <script>
        let characters = [];
        let grid = null;
        let selectedCell = null;
        let userAnswers = Array(9).fill(null);
        let currentInput = '';

        fetch('../characters.json')
            .then(r => r.json())
            .then(data => {
                characters = data.filter(c => c.Nombre && c.Imagen);
                generateGrid();
            });

        function generateGrid() {
            const categories = [
                { field: 'Afiliación', label: 'Afiliación' },
                { field: 'Fruta del diablo', label: 'Tipo Fruta' },
                { field: 'Haki', label: 'Haki' },
                { field: 'Ocupación', label: 'Ocupación' },
                { field: 'Estado', label: 'Estado' },
                { field: 'Raza', label: 'Raza' },
                { field: 'Saga', label: 'Saga' }
            ];

            // Seleccionar 2 categorías diferentes
            const shuffled = categories.sort(() => 0.5 - Math.random());
            const cat1 = shuffled[0];
            const cat2 = shuffled[1];

            // Agrupar personajes
            const grouped1 = {};
            const grouped2 = {};

            characters.forEach(c => {
                const val1 = c[cat1.field];
                const val2 = c[cat2.field];

                if (val1 && val1 !== '---') {
                    val1.split(',').forEach(v => {
                        v = v.trim();
                        if (!grouped1[v]) grouped1[v] = [];
                        grouped1[v].push(c);
                    });
                }

                if (val2 && val2 !== '---') {
                    val2.split(',').forEach(v => {
                        v = v.trim();
                        if (!grouped2[v]) grouped2[v] = [];
                        grouped2[v].push(c);
                    });
                }
            });

            // Seleccionar 3 valores de cada categoría
            const values1 = Object.keys(grouped1).filter(v => grouped1[v].length >= 3).sort(() => 0.5 - Math.random()).slice(0, 3);
            const values2 = Object.keys(grouped2).filter(v => grouped2[v].length >= 3).sort(() => 0.5 - Math.random()).slice(0, 3);

            grid = {
                cat1,
                cat2,
                values1,
                values2,
                grouped1,
                grouped2
            };

            userAnswers = Array(9).fill(null);
            selectedCell = null;
            renderGame();
        }

        function getValidCharacters(row, col) {
            const val1 = grid.values1[row];
            const val2 = grid.values2[col];
            
            const chars1 = grid.grouped1[val1] || [];
            const chars2 = grid.grouped2[val2] || [];
            
            return chars1.filter(c => chars2.some(c2 => c2.Nombre === c.Nombre));
        }

        function selectCell(row, col) {
            const index = row * 3 + col;
            if (userAnswers[index]) return;
            
            selectedCell = { row, col, index };
            currentInput = '';
            renderGame();
        }

        function filterCharacters(query) {
            if (!selectedCell || !query) return [];
            
            const valid = getValidCharacters(selectedCell.row, selectedCell.col);
            return valid.filter(c => 
                c.Nombre.toLowerCase().includes(query.toLowerCase())
            ).slice(0, 10);
        }

        function selectCharacter(char) {
            if (!selectedCell) return;
            
            const valid = getValidCharacters(selectedCell.row, selectedCell.col);
            const isCorrect = valid.some(c => c.Nombre === char.Nombre);
            
            userAnswers[selectedCell.index] = {
                char,
                correct: isCorrect
            };
            
            selectedCell = null;
            currentInput = '';
            
            updateScore();
            renderGame();
        }

        function updateScore() {
            const correct = userAnswers.filter(a => a && a.correct).length;
            document.getElementById('score').textContent = `${correct}/9`;
            
            if (correct === 9) {
                setTimeout(() => {
                    alert('🎉 ¡PERFECTO! ¡Completaste el Grid Challenge!');
                }, 500);
            }
        }

        function renderGame() {
            const app = document.getElementById('app');
            
            let inputHtml = '';
            if (selectedCell !== null) {
                const suggestions = filterCharacters(currentInput);
                inputHtml = `
                    <div class="input-container">
                        <input type="text" 
                               id="charInput" 
                               placeholder="Escribe el nombre del personaje..." 
                               value="${currentInput}"
                               oninput="handleInput(this.value)"
                               autofocus>
                        ${suggestions.length > 0 ? `
                            <div class="suggestions">
                                ${suggestions.map(c => `
                                    <div class="suggestion-item" onclick='selectCharacter(${JSON.stringify(c)})'>
                                        ${c.Nombre}
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            app.innerHTML = `
                ${inputHtml}
                
                <div class="game-grid">
                    <div style="grid-column: 1; grid-row: 1;"></div>
                    ${grid.values2.map((val, i) => `
                        <div class="grid-header" style="grid-column: ${i + 2}; grid-row: 1;">
                            ${val}
                        </div>
                    `).join('')}
                    
                    ${grid.values1.map((val1, row) => `
                        <div class="grid-header" style="grid-column: 1; grid-row: ${row + 2};">
                            ${val1}
                        </div>
                        ${[0, 1, 2].map(col => {
                            const index = row * 3 + col;
                            const answer = userAnswers[index];
                            return `
                                <div class="grid-cell ${answer ? (answer.correct ? 'correct' : 'incorrect') : selectedCell && selectedCell.index === index ? 'filled' : ''}"
                                     style="grid-column: ${col + 2}; grid-row: ${row + 2};"
                                     onclick="selectCell(${row}, ${col})">
                                    ${answer ? `
                                        <img src="${answer.char.Imagen}" alt="${answer.char.Nombre}" onerror="this.style.display='none'">
                                        <div class="name">${answer.char.Nombre}</div>
                                    ` : selectedCell && selectedCell.index === index ? '❓' : ''}
                                </div>
                            `;
                        }).join('')}
                    `).join('')}
                </div>

                <div style="text-align: center;">
                    <button style="padding: 1.25rem 3rem; border-radius: 15px; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; font-size: 1.3rem;" 
                            onclick="generateGrid()">
                        🔄 Nuevo Grid
                    </button>
                </div>
            `;
        }

        function handleInput(value) {
            currentInput = value;
            renderGame();
        }
    </script>
</body>
</html>
